name: Setup Node
description: Checkout, Node.js, npm cache and install

runs:
  using: composite
  steps:

    - name: 🏗 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: 📦 Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: ${{ runner.os }}-npm-

    - name: 📦 Install dependencies
      shell: bash
      run: npm ci